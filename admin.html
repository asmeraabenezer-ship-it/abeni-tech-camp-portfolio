<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Abeni Tech Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { padding-top: 120px; min-height: 100vh; }
        .admin-card { max-width: 600px; margin: 0 auto 50px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--accent-primary); font-weight: 600; }
        select { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none; }
        select option { background: var(--bg-dark); }
        .project-list { margin-top: 50px; }
        .admin-project-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; margin-bottom: 10px; background: var(--glass-bg); border-radius: 10px; border: 1px solid var(--glass-border); }
        .admin-project-info { display: flex; align-items: center; gap: 15px; }
        .admin-project-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .delete-btn { color: #ff4b2b; cursor: pointer; transition: var(--transition-smooth); background: none; border: none; font-size: 1.1rem; }
        .delete-btn:hover { transform: scale(1.2); }
        .upload-btn { width: 100%; }
        .project-list-title { margin-bottom: 20px; }
        .project-item-title { font-weight: 600; }
        .project-item-cat { font-size: 0.8rem; color: var(--text-muted); }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { text-align: center; width: 100%; max-width: 400px; }
        .login-title { margin-bottom: 20px; }
        .login-btn { width: 100%; }
        .login-err { color: #ff4b2b; margin-top: 15px; display: none; }
        #admin-content { display: none; }
    </style>
</head>
<body class="dark-mode">
    <!-- Password Login -->
    <div id="login-overlay">
        <div class="login-card glass-card">
            <h2 class="login-title">Private Admin Access</h2>
            <form id="login-form" class="contact-form">
                <div class="form-group">
                    <input type="password" id="admin-pass" placeholder="Enter Admin Password" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Login</button>
                <p id="login-err" class="login-err">Invalid Password</p>
            </form>
        </div>
    </div>

    <div id="admin-content">
        <nav class="navbar">
            <div class="container nav-container">
                <a href="index.html" class="logo">Abeni<span>Admin</span></a>
                <a href="#" class="btn btn-secondary" onclick="logout()">Logout</a>
            </div>
        </nav>

        <section class="admin-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Manage Portfolio</h2>
                    <div class="title-underline"></div>
                </div>

                <!-- Upload Form -->
                <div class="admin-card glass-card">
                    <h3>Add New Project</h3>
                    <form id="upload-form" class="contact-form">
                        <div class="form-group">
                            <label for="title">Project Title</label>
                            <input type="text" id="title" placeholder="e.g. Modern Web App" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" title="Select Project Category" required>
                                <option value="Web Development">Web Development</option>
                                <option value="Graphic Design">Graphic Design</option>
                                <option value="Video Editing">Video Editing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="projectLink">Project Link (Optional)</label>
                            <input type="url" id="projectLink" placeholder="https://example.com">
                        </div>
                        <div class="form-group">
                            <label for="status">Project Status</label>
                            <select id="status" required>
                                <option value="Fully Finished">Fully Finished</option>
                                <option value="In Progress">In Progress</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="image">Project Image</label>
                            <input type="file" id="image" accept="image/*" required title="Choose project image">
                        </div>
                        <button type="submit" class="btn btn-primary upload-btn">Upload Project</button>
                    </form>
                </div>

                <!-- Project List -->
                <div class="project-list reveal">
                    <h3 class="project-list-title">Existing Projects</h3>
                    <div id="admin-projects-container">
                        <!-- Projects will be loaded here -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const ADMIN_PASS = 'abeni2026'; // Change your password here
        const loginOverlay = document.getElementById('login-overlay');
        const adminContent = document.getElementById('admin-content');
        const loginForm = document.getElementById('login-form');
        const loginErr = document.getElementById('login-err');

        // Check Login Status
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showAdmin();
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_PASS) {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                loginErr.style.display = 'block';
            }
        });

        function showAdmin() {
            loginOverlay.style.display = 'none';
            adminContent.style.display = 'block';
            loadProjects();
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.reload();
        }

        const API_URL = 'http://localhost:5000/api/projects';
        const form = document.getElementById('upload-form');
        const container = document.getElementById('admin-projects-container');

        // Load Projects
        async function loadProjects() {
            try {
                const res = await fetch(API_URL);
                const projects = await res.json();
                container.innerHTML = '';
                projects.forEach(p => {
                    const imgPath = p.imagePath.startsWith('/') ? `http://localhost:5000${p.imagePath}` : p.imagePath;
                    const div = document.createElement('div');
                    div.className = 'admin-project-item';
                    div.innerHTML = `
                        <div class="admin-project-info">
                            <img src="${imgPath}" class="admin-project-thumb" alt="${p.title}">
                            <div>
                                <div class="project-item-title">${p.title}</div>
                                <div class="project-item-cat">${p.category} | Status: ${p.status || 'Fully Finished'}</div>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteProject('${p._id}')" aria-label="Delete Project">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error('Failed to load projects');
            }
        }

        // Handle Upload
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('projectLink', document.getElementById('projectLink').value);
            formData.append('status', document.getElementById('status').value);
            formData.append('image', document.getElementById('image').files[0]);

            const btn = form.querySelector('.upload-btn');
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    alert('Project uploaded successfully!');
                    form.reset();
                    loadProjects();
                }
            } catch (err) {
                alert('Upload failed. Is the server running?');
            } finally {
                btn.innerText = 'Upload Project';
                btn.disabled = false;
            }
        });

        // Delete Project
        async function deleteProject(id) {
            if (confirm('Are you sure you want to delete this project?')) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        loadProjects();
                    }
                } catch (err) {
                    alert('Delete failed.');
                }
            }
        }
    </script>
</body>
</html>
